<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
  <header style="display: flex; justify-content: space-between; align-items: center;">
    <div>
      <h1>💰 Expense Tracker</h1>
      <p class="subtitle">Manage your expenses efficiently</p>
    </div>
    <!-- 🔴 Logout Button Added -->
    <button id="logout-btn" class="btn btn-danger" style="padding: 8px 15px; background-color: #e63946; color: white; border: none; border-radius: 5px; cursor: pointer;">
      Logout
    </button>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Expenses</div>
      <div class="stat-value">₹<span id="total-amount">0</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Items</div>
      <div class="stat-value"><span id="total-items">0</span></div>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">Add New Expense</h2>
    <form id="expense-form">
      <div class="form-grid">
        <input type="text" id="title" placeholder="Expense Title" required>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Bills">💡 Bills</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Health">🏥 Health</option>
          <option value="Other">📌 Other</option>
        </select>
        <input type="date" id="date" required>
      </div>
      <button type="submit" class="btn btn-primary">Add Expense</button>
    </form>
  </div>

  <div class="card">
    <h2 class="section-title">Expense History</h2>
    <div class="table-container">
      <table id="expense-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr class="empty-state">
            <td colspan="5">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
              <p>No expenses yet. Add your first expense above!</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="script.js"></script>

<!-- 🔒 Logout Script -->
<script>
  // Prevent access if user not logged in
  if (!localStorage.getItem("loggedInUser")) {
    window.location.href = "login.html";
  }

  // Logout functionality
  document.getElementById("logout-btn").addEventListener("click", () => {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
  });
</script>

  
</body>
</html>
